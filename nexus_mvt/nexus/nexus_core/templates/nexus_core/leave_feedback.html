{% extends 'nexus_core/base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow border dark:bg-gray-800 dark:border-gray-700">
        
        <div class="text-center border-b border-gray-200 dark:border-gray-700 pb-6 mb-6">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 dark:bg-green-900 mb-4">
                <svg class="h-6 w-6 text-green-600 dark:text-green-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white">
                Job Completed!
            </h2>
            <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
                You have successfully marked your request as complete. How was your experience with <span class="font-bold text-gray-700 dark:text-gray-300">{{ worker.user.username }}</span>?
            </p>
        </div>

        <form class="space-y-6" method="POST">
            {% csrf_token %}
            
            <div>
                <label for="id_rating" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Rating (1 to 5)</label>
                <select name="rating" id="id_rating" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" required>
                    <option value="5" selected>5 - Excellent</option>
                    <option value="4">4 - Good</option>
                    <option value="3">3 - Average</option>
                    <option value="2">2 - Poor</option>
                    <option value="1">1 - Terrible</option>
                </select>
            </div>
            
            <div>
                <label for="id_comment" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Review Comment (Optional)</label>
                <textarea name="comment" id="id_comment" rows="4" class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Share details about the service..."></textarea>
            </div>

            <button type="submit" class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-3 text-center transition-colors">
                Submit Feedback
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="{% url 'my_requests' %}" class="text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300">Skip & return to dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
