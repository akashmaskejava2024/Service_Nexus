{% extends 'nexus_core/base.html' %}

{% block content %}
<div class="flex items-center justify-center min-vh-100 bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 flex-grow">
    <div class="max-w-xl w-full space-y-8 bg-white p-10 rounded-xl shadow border dark:bg-gray-800 dark:border-gray-700">
        <div class="border-b border-gray-200 dark:border-gray-700 pb-5">
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white">
                Submit Your Bid
            </h2>
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                You are offering your services for a request by <span class="font-bold">{{ service_request.customer.username }}</span>.
            </p>
        </div>

        <div class="bg-gray-50 dark:bg-gray-700/50 p-4 rounded-lg mb-6 text-sm text-gray-700 dark:text-gray-300 border dark:border-gray-600">
            <span class="font-bold block mb-2 text-gray-900 dark:text-white">Request Description:</span>
            <p class="whitespace-pre-wrap">{{ service_request.description }}</p>
        </div>

        <form method="POST" action="{% url 'submit_bid' service_request.id %}" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="amount" class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white">Bid Amount ($)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <span class="text-gray-500 sm:text-sm">$</span>
                    </div>
                    <input type="number" step="0.01" name="amount" id="amount" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-600 focus:border-blue-600 block w-full pl-8 p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="0.00" required>
                </div>
            </div>
            
            <div>
                <label for="message" class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white">Message to Customer (Optional)</label>
                <textarea id="message" name="message" rows="4" class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Include timeline or extra service details..."></textarea>
            </div>

            <div class="flex gap-4 pt-4 border-t border-gray-200 dark:border-gray-700 mt-6">
                <a href="{% url 'worker_dashboard' %}" class="text-center w-1/3 text-gray-700 bg-gray-100 hover:bg-gray-200 focus:ring-4 focus:outline-none focus:ring-gray-300 font-medium rounded-lg text-sm px-5 py-3 dark:bg-gray-700 dark:text-white dark:hover:bg-gray-600 transition-colors">
                    Cancel
                </a>
                <button type="submit" class="w-2/3 text-white inline-flex justify-center bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300 font-bold rounded-lg text-sm px-5 py-3 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 transition-colors">
                    Confirm Bid
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
